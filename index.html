<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Legacy Blade Prototype</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #ui { position: absolute; top: 20px; right: 20px; color: #f4d03f; font-family: sans-serif; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="ui">
        <h1>Legacy Blade</h1>
        <p>السيف الأسطوري قيد التشكيل...</p>
    </div>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);

        // إضاءة أقوى للسيف
        const light = new THREE.DirectionalLight(0xffffff, 1.5);
        light.position.set(5, 10, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // الأرضية
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), new THREE.MeshLambertMaterial({ color: 0xD2B48C }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // تصميم "سيف" بسيط (مقبض + نصل)
        const swordGroup = new THREE.Group();
        
        // النصل (Blade)
        const blade = new THREE.Mesh(new THREE.BoxGeometry(0.2, 3, 0.1), new THREE.MeshPhongMaterial({ color: 0xc0c0c0 }));
        blade.position.y = 1.5;
        swordGroup.add(blade);
        
        // المقبض (Handle)
        const handle = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.5, 0.3), new THREE.MeshPhongMaterial({ color: 0x4b2c20 }));
        handle.position.y = -0.25;
        swordGroup.add(handle);

        scene.add(swordGroup);

        camera.position.set(3, 3, 3);
        controls.update();

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
