<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Legacy Blade Prototype</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #ui { position: absolute; top: 20px; right: 20px; color: #f4d03f; font-family: 'Arial', sans-serif; }
    </style>
    <!-- استدعاء محرك Three.js الخفيف -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui">
        <h1>Legacy Blade</h1>
        <p>جاري تهيئة المحرك...</p>
    </div>
    <script>
        // إعداد المشهد الأساسي
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        camera.position.z = 5;

        // دالة التحديث
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
        
        console.log("المحرك يعمل بنجاح!");
    </script>
</body>
</html>
