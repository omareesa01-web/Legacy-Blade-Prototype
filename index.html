<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legacy Blade - Engine</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #game-canvas { display: block; width: 100vw; height: 100vh; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: white; padding: 20px; box-sizing: border-box; }
        .hud-element { pointer-events: auto; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; border: 1px solid #444; }
    </style>
    <!-- استدعاء المكتبات -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="ui-layer">
        <div class="hud-element" id="status-panel">
            <h1>Legacy Blade v1.0</h1>
            <p id="engine-status">الوضع: التهيئة...</p>
        </div>
    </div>

    <script>
        // === Engine Initialization ===
        class GameEngine {
            constructor() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x111111);
                
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                document.body.appendChild(this.renderer.domElement);

                this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
                this.clock = new THREE.Clock();
                
                this.initLights();
                this.initWorld();
                this.animate();
            }

            initLights() {
                const ambient = new THREE.AmbientLight(0x404040, 2);
                this.scene.add(ambient);

                const dirLight = new THREE.DirectionalLight(0xffffff, 1);
                dirLight.position.set(10, 20, 10);
                dirLight.castShadow = true;
                this.scene.add(dirLight);
            }

            initWorld() {
                // أرضية تجريبية
                const geo = new THREE.PlaneGeometry(100, 100);
                const mat = new THREE.MeshLambertMaterial({ color: 0x333333 });
                this.ground = new THREE.Mesh(geo, mat);
                this.ground.rotation.x = -Math.PI / 2;
                this.ground.receiveShadow = true;
                this.scene.add(this.ground);
                
                this.camera.position.set(10, 10, 10);
                document.getElementById('engine-status').innerText = "الوضع: النظام جاهز";
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                this.controls.update();
                this.renderer.render(this.scene, this.camera);
            }
        }

        // تشغيل المحرك
        window.onload = () => {
            new GameEngine();
        };

        // التعامل مع تغير حجم الشاشة
        window.addEventListener('resize', () => {
            location.reload(); 
        });
    </script>
</body>
</html>
